<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)" />
  <!-- Stylized "W" letterform - flowing, modern -->
  <g transform="translate(128,148)" fill="none" stroke="url(#fg)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left stem of W, slightly curved -->
    <path d="M-68,-48 C-68,-40 -60,48 -40,48" />
    <!-- Middle left V -->
    <path d="M-40,48 C-20,48 -12,-48 0,-48" />
    <!-- Middle right V -->
    <path d="M0,-48 C12,-48 20,48 40,48" />
    <!-- Right stem -->
    <path d="M40,48 C60,48 68,-40 68,-48" />
  </g>
  <!-- Subtle wave accent below W -->
  <path d="M60,188 Q80,172 100,188 Q120,204 140,188 Q160,172 180,188 Q196,200 210,188" 
        fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.3" />
</svg>
