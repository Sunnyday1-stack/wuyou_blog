version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: myblog-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: blog_password_2024
      MYSQL_DATABASE: blog_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../blog_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/sunnyday1-stack/wuyou_blog/myblog-backend:latest
    container_name: myblog-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: blog_db
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: blog_password_2024
      UPLOAD_DIR: /opt/myblog/uploads/
    volumes:
      - uploads_data:/opt/myblog/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: ghcr.io/sunnyday1-stack/wuyou_blog/myblog-frontend:latest
    container_name: myblog-frontend
    restart: always
    ports:
      - "80:80"
    environment:
      BACKEND_HOST: backend
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
